<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>蝶舞岚间</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="蝶舞岚间">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e; display: flex; justify-content: center; align-items: center;
    height: 100vh; overflow: hidden;
    font-family: 'Georgia', 'SimSun', 'STSong', serif;
    touch-action: manipulation;
    -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
  }
  #game-container { position: relative; display: flex; justify-content: center; align-items: center; }
  canvas { display: block; border-radius: 8px; box-shadow: 0 0 40px rgba(180, 160, 220, 0.35); }
  #mobile-controls {
    display: none; position: absolute; bottom: 10px; left: 0; right: 0;
    padding: 0 10px; justify-content: space-between; pointer-events: none;
  }
  .ctrl-group { display: flex; gap: 8px; pointer-events: auto; }
  .ctrl-btn {
    width: 56px; height: 56px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.1);
    color: white; font-size: 24px; display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .ctrl-btn:active { background: rgba(255,255,255,0.3); }
  .ctrl-btn.jump { width: 72px; height: 72px; background: rgba(180,150,220,0.25); border-color: rgba(180,150,220,0.5); }
  @media (max-width: 768px) { #mobile-controls { display: none; } }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="game"></canvas>
  <div id="mobile-controls">
    <div class="ctrl-group">
      <button class="ctrl-btn" id="btn-left">◀</button>
      <button class="ctrl-btn" id="btn-right">▶</button>
    </div>
    <div class="ctrl-group">
      <button class="ctrl-btn" id="btn-attack">⚔</button>
    </div>
    <div class="ctrl-group">
      <button class="ctrl-btn jump" id="btn-jump">▲</button>
    </div>
  </div>
</div>
<script>
// Service Worker (PWA离线缓存)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

// ==================== 🦋 故事配置 ====================
const STORY = {
  herName: '蝶蝶',
  yourName: '岚岚',
  title: '蝶舞岚间',
  subtitle: '山间有雾，雾中有蝶',

  prologue: '岚岚是山间的一缕雾，蝶蝶是雾中飞舞的一只蝴蝶。\n岚岚总在清晨出现，只为等蝶蝶穿过他的那一刻。\n\n有一天，一阵风把蝶蝶吹去了远方……\n岚岚决定离开这片山，去找她回来。',

  // 6关关卡名
  levelNames: [
    '第一幕 · 山间初遇',
    '第二幕 · 雾起同行',
    '第三幕 · 风急蝶惊',
    '第四幕 · 穿山越岭',
    '第五幕 · 星河暗涌',
    '第六幕 · 岚归蝶舞',
  ],

  // 6关通关独白
  levelEpilogues: [
    '那是一个春天的清晨，山雾正浓，\n一只小蝴蝶落在了岚岚的手心。\n他第一次知道了心跳的声音。',
    '他们一起穿过薄雾，越过小溪。\n岚岚觉得，只要有蝶蝶在，\n这个世界就没有什么好怕的。',
    '风忽然大了，蝶蝶被吹得摇摆不定。\n岚岚拼命伸出手——\n"抓住我！我不会松开的！"',
    '这是一段漫长的路。\n怀疑、距离、时间——每一个都想阻挡他。\n但他知道，蝶蝶就在前方。',
    '夜幕降临，满天星辰。\n岚岚已经走了很远很远，\n可他一点都不觉得累。',
    '他终于找到了她——\n蝴蝶停在最初的枝头，翅膀轻轻扇动。\n雾散去，阳光洒下，他们再也不会分开。',
  ],

  // 情书
  loveLetter: [
    '亲爱的蝶蝶：',
    '',
    '我是岚岚，那缕笨拙的山雾。',
    '',
    '遇见你之前，',
    '我以为自己只是一阵风，',
    '飘过就算。',
    '',
    '可是你来了——',
    '一只小蝴蝶，',
    '轻轻扇了扇翅膀，',
    '我的整个世界都变了。',
    '',
    '你知道吗？',
    '雾是因为有了光才会散，',
    '而你就是我的光。',
    '',
    '每一次见你笑，',
    '就像清晨第一缕阳光穿过雾气，',
    '温柔得让我不想飘走。',
    '',
    '我想一直这样，',
    '守在你的旁边，',
    '做你专属的山雾。',
    '',
    '蝶舞岚间，岚随蝶动。',
    '蝴蝶在哪里，雾就在哪里。',
    '',
    '我爱你，蝶蝶。',
    '',
    '—— 永远爱你的岚岚',
  ].join('\n'),
};

// 三种难度模式
const DIFFICULTY = {
  EASY:   { name: '🌿 简单', lives: 7, enemySpeedMul: 0.65, enemyCountAdd: -1, coyote: 12, desc: '轻轻松松，慢慢走' },
  NORMAL: { name: '🍂 普通', lives: 5, enemySpeedMul: 1.0,  enemyCountAdd: 0,  coyote: 8,  desc: '正常挑战，刚刚好' },
  HARD:   { name: '🔥 困难', lives: 3, enemySpeedMul: 1.4,  enemyCountAdd: 1,  coyote: 4,  desc: '高难挑战，全力以赴' },
};

// 技能/道具系统
const POWERUP_TYPES = {
  heal:      { name: '回血', emoji: '❤️', color: '#ff4757', weight: 25, desc: '回复1点生命' },
  speed:     { name: '加速', emoji: '⚡', color: '#ffd700', weight: 20, desc: '15秒移动加速', duration: 900 },
  shield:    { name: '无敌', emoji: '🛡️', color: '#7bed9f', weight: 15, desc: '10秒无敌护盾', duration: 600 },
  double:    { name: '双倍', emoji: '⭐', color: '#ffa502', weight: 15, desc: '20秒双倍分数', duration: 1200 },
  extraLife: { name: '加命', emoji: '🦋', color: '#ff69b4', weight: 10, desc: '增加1条命' },
  clearAll:  { name: '全清', emoji: '💥', color: '#ff6348', weight: 5,  desc: '消灭屏幕所有敌人' },
  slowEnemy: { name: '迟缓', emoji: '🐌', color: '#a4b0be', weight: 10, desc: '10秒敌人减速', duration: 600 },
};
const DROP_CHANCE = 0.35; // 35%概率掉落
const DROP_LIFETIME = 600; // 掉落物存活600帧(10秒)

// ==================== Canvas Setup ====================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const GAME_W = 960, GAME_H = 540;
canvas.width = GAME_W;
canvas.height = GAME_H;

function resize() {
  const scale = Math.min(window.innerWidth / GAME_W, window.innerHeight / GAME_H) * 0.95;
  canvas.style.width = (GAME_W * scale) + 'px';
  canvas.style.height = (GAME_H * scale) + 'px';
}
window.addEventListener('resize', resize);
resize();

// ==================== Input ====================
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jumpBufferTimer = JUMP_BUFFER_FRAMES; }
  if (e.code === 'Digit1' || e.code === 'KeyE') keys['Mode1'] = true;
  if (e.code === 'Digit2' || e.code === 'KeyN') keys['Mode2'] = true;
  if (e.code === 'Digit3' || e.code === 'KeyH') keys['Mode3'] = true;
  if (e.code === 'KeyJ' || e.code === 'KeyK') {
    e.preventDefault();
    tryAttack(); // 攻击键 — 按J或K
  }
});
window.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') jumpHeld = false;
});

function setupMobileButton(id, key) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.addEventListener('pointerdown', e => { e.preventDefault(); keys[key] = true; if (key==='Space') { jumpBufferTimer=JUMP_BUFFER_FRAMES; } if (key==='Attack') { tryAttack(); } });
  btn.addEventListener('pointerup', e => { e.preventDefault(); keys[key] = false; if (key==='Space') jumpHeld=false; });
  btn.addEventListener('pointerleave', e => { keys[key] = false; if (key==='Space') jumpHeld=false; });
}
setupMobileButton('btn-left', 'ArrowLeft');
setupMobileButton('btn-right', 'ArrowRight');
setupMobileButton('btn-jump', 'Space');
setupMobileButton('btn-attack', 'Attack');

// Canvas touch/click for start screen and mode selection (mobile friendly)
canvas.addEventListener('click', e => handleCanvasTap(e));
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (e.changedTouches.length === 1) handleCanvasTap(e.changedTouches[0]);
});

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (GAME_W / rect.width),
    y: (e.clientY - rect.top) * (GAME_H / rect.height),
  };
}

function handleCanvasTap(e) {
  const pos = getCanvasPos(e);

  if (gameState === STATE.START) {
    gameState = STATE.MODE_SELECT;
    levelTransitionTimer = 0;
    keys['Space'] = false; keys['ArrowUp'] = false; keys['KeyW'] = false;
    jumpBufferTimer = 0;
    return;
  }

  if (gameState === STATE.MODE_SELECT) {
    // Check which mode card was tapped
    const modes = [DIFFICULTY.EASY, DIFFICULTY.NORMAL, DIFFICULTY.HARD];
    for (let i = 0; i < 3; i++) {
      const mx = GAME_W/2 - 200 + i * 200;
      const my = 250;
      if (pos.x > mx-80 && pos.x < mx+80 && pos.y > my-70 && pos.y < my+130) {
        if (i === 0) difficulty = 'EASY';
        else if (i === 1) difficulty = 'NORMAL';
        else difficulty = 'HARD';
        startGame();
        return;
      }
    }
    return;
  }

  if (gameState === STATE.LEVEL_COMPLETE && levelTransitionTimer <= 0) {
    nextLevel();
    return;
  }

  if (gameState === STATE.WIN || gameState === STATE.GAMEOVER) {
    if (levelTransitionTimer <= 30) {
      gameState = STATE.MODE_SELECT;
      keys['Space'] = false; keys['ArrowUp'] = false; keys['KeyW'] = false;
      jumpBufferTimer = 0;
    }
    return;
  }
}

// ==================== Game State ====================
const STATE = { START: 0, MODE_SELECT: 1, PLAYING: 2, LEVEL_COMPLETE: 3, WIN: 4, GAMEOVER: 5 };
let gameState = STATE.START;
let currentLevel = 0;
let score = 0;
let lives = 5;
let difficulty = 'NORMAL';
let levelTransitionTimer = 0;
let shakeTimer = 0;
let shakeIntensity = 0;
let totalLevels = 6;

// Player
let player = { x: 0, y: -100, w: 32, h: 38, vx: 0, vy: 0, onGround: false, facing: 1, animTimer: 0, invincible: 0, trailTimer: 0 };
let coyoteTimer = 0, jumpBufferTimer = 0, jumpHeld = false, prevOnGround = false;
let attackCooldown = 0; // 攻击冷却
let activeBuffs = {};   // 当前激活的技能效果

// Camera
let camera = { x: 0, y: 0 };

// Entities
let platforms = [];
let butterflyFeathers = [];
let enemies = [];
let particles = [];
let projectiles = [];    // 攻击弹幕
let powerupDrops = [];   // 掉落技能包
let goal = { x: 0, y: 0, w: 24, h: 80 };

// ==================== Drawing ====================
function drawHeart(cx, cy, size, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  const s = size / 2;
  ctx.moveTo(cx, cy + s * 0.3);
  ctx.bezierCurveTo(cx, cy - s * 0.3, cx - s, cy - s * 0.3, cx - s, cy + s * 0.3);
  ctx.bezierCurveTo(cx - s, cy + s * 0.9, cx, cy + s * 1.3, cx, cy + s * 1.5);
  ctx.bezierCurveTo(cx, cy + s * 1.3, cx + s, cy + s * 0.9, cx + s, cy + s * 0.3);
  ctx.bezierCurveTo(cx + s, cy - s * 0.3, cx, cy - s * 0.3, cx, cy + s * 0.3);
  ctx.fill();
}

function roundedRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function drawButterfly(cx, cy, size, wingAngle) {
  ctx.save(); ctx.translate(cx, cy);
  const wa = wingAngle || Math.sin(Date.now() * 0.008) * 0.4;
  ctx.fillStyle = '#e8a0d0';
  ctx.beginPath(); ctx.ellipse(-4, -2, size*0.5, size*0.3, -0.3-wa, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(4, -2, size*0.5, size*0.3, 0.3+wa, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#f0c8e8';
  ctx.beginPath(); ctx.ellipse(-3, 2, size*0.35, size*0.22, -0.5-wa*0.6, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(3, 2, size*0.35, size*0.22, 0.5+wa*0.6, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath(); ctx.arc(-4, -3, size*0.12, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4, -3, size*0.12, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#b07090'; ctx.fillRect(-1, -size*0.4, 2, size*0.8);
  ctx.strokeStyle = '#b07090'; ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(0, -size*0.35); ctx.quadraticCurveTo(-3, -size*0.6, -4, -size*0.7);
  ctx.moveTo(0, -size*0.35); ctx.quadraticCurveTo(3, -size*0.6, 4, -size*0.7); ctx.stroke();
  ctx.restore();
}

function drawPlayer() {
  if (player.invincible > 0 && Math.floor(player.invincible * 10) % 2 === 0) return;
  const { x, y, w, h } = player;
  const cx = x + w/2, cy = y + h/2;
  ctx.save(); ctx.translate(cx, cy);
  if (player.facing === -1) ctx.scale(-1, 1);
  const bob = player.onGround ? Math.sin(player.animTimer * 0.3) * 2 : 0;

  // Mist trail
  if (player.onGround || Math.abs(player.vx) > 0.5) {
    ctx.fillStyle = 'rgba(200,190,220,0.25)';
    ctx.beginPath(); ctx.arc(-4, h/2-2, 10+Math.sin(Date.now()*0.01)*3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(210,200,230,0.18)';
    ctx.beginPath(); ctx.arc(-8, h/2+2, 6, 0, Math.PI*2); ctx.fill();
  }

  // Feet
  ctx.fillStyle = '#c8bfd8';
  const footOff = player.onGround ? Math.sin(player.animTimer * 0.3) * 4 : 2;
  ctx.fillRect(-10, h/2-6+bob, 8, 7); ctx.fillRect(2, h/2-6-footOff+bob, 8, 7);

  // Body
  const bodyGrad = ctx.createRadialGradient(0, -2, 4, 0, 0, 16);
  bodyGrad.addColorStop(0, '#d8d0f0'); bodyGrad.addColorStop(0.6, '#b8a8d8'); bodyGrad.addColorStop(1, '#9888b8');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath(); ctx.arc(0, -2+bob, 15, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(220,210,240,0.3)';
  ctx.beginPath(); ctx.arc(0, -2+bob, 13, 0, Math.PI*2); ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-5, -6+bob, 6.5, 0, Math.PI*2); ctx.arc(5, -6+bob, 6.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#3a3060';
  ctx.beginPath(); ctx.arc(-4, -5+bob, 2.8, 0, Math.PI*2); ctx.arc(6, -5+bob, 2.8, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-5, -6.5+bob, 1.2, 0, Math.PI*2); ctx.arc(5, -6.5+bob, 1.2, 0, Math.PI*2); ctx.fill();

  // Blush
  ctx.fillStyle = 'rgba(200,160,180,0.45)';
  ctx.beginPath(); ctx.arc(-9, -1+bob, 3.5, 0, Math.PI*2); ctx.arc(9, -1+bob, 3.5, 0, Math.PI*2); ctx.fill();

  // Shield effect (from powerup)
  if (player.invincible > 60) {
    ctx.strokeStyle = `rgba(123,237,159,${0.3+Math.sin(Date.now()*0.01)*0.2})`;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(0, -2+bob, 20, 0, Math.PI*2); ctx.stroke();
  }

  if (player.trailTimer % 6 === 0) {
    particles.push({ x: x+w/2+(Math.random()-0.5)*20, y: y+h, vx: (Math.random()-0.5)*1.5, vy: -1-Math.random()*2, life: 1, decay: 0.03, color: 'rgba(200,190,220,', size: 3+Math.random()*3 });
  }
  player.trailTimer++;
  ctx.restore();
}

function drawEnemy(e) {
  ctx.save(); ctx.translate(e.x+e.w/2, e.y+e.h/2);

  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.ellipse(0, e.h/2-2, e.w*0.38, 3, 0, 0, Math.PI*2); ctx.fill();

  // Color by type
  const colors = {
    '怀疑': ['#5a4a6a','#2a1a3a'],
    '距离': ['#4a5a6a','#1a2a3a'],
    '时间': ['#6a5a4a','#3a2a1a'],
    '孤独': ['#5a2a3a','#3a0a1a'],
    '恐惧': ['#3a5a3a','#1a3a1a'],
  };
  const [c1, c2] = colors[e.label] || colors['怀疑'];
  const grad = ctx.createRadialGradient(0, -2, 2, 0, 0, e.w/2);
  grad.addColorStop(0, c1); grad.addColorStop(1, c2);
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(0, 0, e.w/2-2, 0, Math.PI*2); ctx.fill();

  // Jagged aura
  ctx.fillStyle = 'rgba(30,15,50,0.5)';
  for (let i = 0; i < (e.isFast ? 7 : 6); i++) {
    const a = (i / (e.isFast ? 7 : 6)) * Math.PI * 2;
    ctx.beginPath(); ctx.arc(Math.cos(a)*(e.w/2-1), Math.sin(a)*(e.h/2-1)-1, e.isFast ? 3 : 5, 0, Math.PI*2); ctx.fill();
  }

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-5, -3, 5.5, 0, Math.PI*2); ctx.arc(5, -3, 5.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a0a2a';
  ctx.beginPath(); ctx.arc(-4, -2, 2.5, 0, Math.PI*2); ctx.arc(6, -2, 2.5, 0, Math.PI*2); ctx.fill();

  // Brows
  ctx.strokeStyle = '#1a0a2a'; ctx.lineWidth = 1.8;
  ctx.beginPath();
  ctx.moveTo(-9, -8); ctx.lineTo(-3, -6);
  ctx.moveTo(3, -6); ctx.lineTo(9, -8); ctx.stroke();

  // If fast, add speed lines
  if (e.isFast) {
    ctx.strokeStyle = 'rgba(200,100,80,0.4)'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(e.w/2, -4); ctx.lineTo(e.w/2+6, -6);
    ctx.moveTo(e.w/2, 2); ctx.lineTo(e.w/2+6, 4);
    ctx.moveTo(-e.w/2, -4); ctx.lineTo(-e.w/2-6, -6);
    ctx.moveTo(-e.w/2, 2); ctx.lineTo(-e.w/2-6, 4);
    ctx.stroke();
  }

  ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '10px SimSun, serif'; ctx.textAlign = 'center';
  ctx.fillText(e.label || '', 0, -e.h/2-6);
  ctx.restore();
}

function drawPlatform(p) {
  const grad = ctx.createLinearGradient(p.x, p.y, p.x, p.y+p.h);
  grad.addColorStop(0, '#a898b8'); grad.addColorStop(0.3, '#9888a8'); grad.addColorStop(1, '#786880');
  ctx.fillStyle = grad; ctx.fillRect(p.x, p.y, p.w, p.h);
  const mossH = 7;
  ctx.fillStyle = '#9ab89a'; ctx.fillRect(p.x, p.y, p.w, mossH);
  ctx.fillStyle = '#a8c8a8';
  for (let gx = p.x; gx < p.x+p.w; gx += 8) ctx.fillRect(gx, p.y, 4, mossH+1);
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  for (let dx = p.x+3; dx < p.x+p.w; dx += 14)
    for (let dy = p.y+mossH+3; dy < p.y+p.h; dy += 10) ctx.fillRect(dx, dy, 2, 2);
  ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 1; ctx.strokeRect(p.x, p.y, p.w, p.h);
}

function drawGoal() {
  const gx = goal.x+goal.w/2;

  ctx.beginPath(); ctx.arc(gx, goal.y+10, 40, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle = '#d8c8a8'; ctx.fillRect(gx-0.5, goal.y, 1, goal.h);
  const wave = Math.sin(Date.now()*0.005)*3;
  ctx.fillStyle = '#d4a0c0';
  ctx.beginPath();
  ctx.moveTo(gx+2, goal.y+4); ctx.lineTo(gx+38+wave, goal.y+18); ctx.lineTo(gx+2, goal.y+32); ctx.closePath();
  ctx.fill();
  drawButterfly(gx+14+wave*0.5, goal.y+18, 16, Math.sin(Date.now()*0.012)*0.5);

function drawBackground() {
  const palettes = [
    ['#f5f0ff','#e8ddf0','#d8c8e8'], ['#fff5ee','#f0e0d0','#e0c8a8'],
    ['#f0f0ff','#d0d8f0','#a0a8c8'], ['#fff0f0','#f0d8d0','#d8b8a8'],
    ['#e8e0f0','#c0b8d0','#584878'], ['#e8e0f0','#c8b8e0','#685890'],
  ];
  const [c1, c2, c3] = palettes[Math.min(currentLevel, 5)] || palettes[0];
  const grad = ctx.createLinearGradient(0, 0, 0, GAME_H);
  grad.addColorStop(0, c1); grad.addColorStop(0.55, c2); grad.addColorStop(1, c3);
  ctx.fillStyle = grad; ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Mist layers
  for (let layer = 0; layer < 3; layer++) {
    ctx.fillStyle = `rgba(220,210,235,${0.15+layer*0.08})`;
    for (let i = 0; i < 6; i++) {
      const mx = (i*220+30*layer)-(camera.x*(0.05+layer*0.08))%(GAME_W+260);
      ctx.beginPath(); ctx.ellipse(mx, 40+layer*60, 60+layer*25, 18+layer*8, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(mx-25, 50+layer*60, 40, 14, 0, 0, Math.PI*2); ctx.fill();
    }
  }

  // Stars (levels 5+)
  if (currentLevel >= 4) {
    for (let i = 0; i < 50; i++) {
      const twinkle = Math.sin(Date.now()*0.002+i)*0.5+0.5;
      ctx.fillStyle = `rgba(255,255,240,${0.25+twinkle*0.65})`;
      ctx.beginPath(); ctx.arc((i*97+30)%GAME_W, (i*67+15)%(GAME_H*0.55), 0.8+twinkle*1.2, 0, Math.PI*2); ctx.fill();
    }
  }

  // Mountains
  ctx.fillStyle = currentLevel >= 4 ? 'rgba(50,40,70,0.55)' : 'rgba(180,170,190,0.4)';
  ctx.beginPath(); ctx.moveTo(0, GAME_H);
  for (let x = 0; x <= GAME_W; x += 2) {
    ctx.lineTo(x, GAME_H-90-Math.sin((x+camera.x*0.08)*0.004)*45-Math.sin((x+camera.x*0.08)*0.011)*25-Math.sin((x+camera.x*0.08)*0.023)*15);
  }
  ctx.lineTo(GAME_W, GAME_H); ctx.fill();

  // Distant butterflies
  if (currentLevel >= 1) {
    for (let i = 0; i < 3; i++) {
      ctx.globalAlpha = 0.25;
      drawButterfly((i*400+150+Date.now()*0.015*(i+1))%(GAME_W+100)-50, 60+i*45+Math.sin(Date.now()*0.003+i)*15, 10, Math.sin(Date.now()*0.01+i)*0.6);
    }
    ctx.globalAlpha = 1;
  }
}

function spawnParticles(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    particles.push({ x, y, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6-2, life: 1, decay: 0.018+Math.random()*0.04, color, size: 2+Math.random()*4 });
  }
}

// 攻击系统
const ATTACK_COOLDOWN = 25; // 攻击冷却帧数(~0.4秒)
const PROJECTILE_SPEED = 7;
const PROJECTILE_LIFE = 90;

function tryAttack() {
  if (attackCooldown > 0) return;
  if (gameState !== STATE.PLAYING) return;
  attackCooldown = ATTACK_COOLDOWN;
  const cx = player.x + player.w/2;
  const cy = player.y + player.h/2;
  projectiles.push({
    x: cx, y: cy - 4,
    vx: player.facing * PROJECTILE_SPEED,
    vy: 0,
    life: PROJECTILE_LIFE,
  });
  // 攻击特效
  spawnParticles(cx + player.facing * 15, cy, 6, '#d0c0f0');
}

function drawProjectile(p) {
  const alpha = Math.min(1, p.life / 20);
  ctx.globalAlpha = alpha;
  // Glow
  const glow = ctx.createRadialGradient(p.x, p.y, 2, p.x, p.y, 10);
  glow.addColorStop(0, 'rgba(220,200,255,0.8)'); glow.addColorStop(1, 'rgba(220,200,255,0)');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(p.x, p.y, 10, 0, Math.PI*2); ctx.fill();
  // Core
  ctx.fillStyle = '#e0d0ff';
  ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(p.x-1, p.y-1, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
}

// 技能掉落系统
function spawnPowerupDrop(x, y) {
  const types = Object.entries(POWERUP_TYPES);
  const totalWeight = types.reduce((s, [, t]) => s + t.weight, 0);
  let roll = Math.random() * totalWeight;
  let chosen = types[0][0];
  for (const [key, t] of types) {
    roll -= t.weight;
    if (roll <= 0) { chosen = key; break; }
  }
  powerupDrops.push({
    x: x - 12, y: y - 12, w: 24, h: 24,
    type: chosen,
    life: DROP_LIFETIME,
    bobOffset: Math.random() * Math.PI * 2,
  });
}

function drawPowerupDrop(d) {
  const bob = Math.sin(Date.now()*0.005 + d.bobOffset) * 6;
  const cx = d.x + d.w/2, cy = d.y + d.h/2 + bob;
  const t = POWERUP_TYPES[d.type];
  if (!t) return;

  // Fade out when about to expire
  const fadeAlpha = d.life < 60 ? d.life / 60 : 1;
  ctx.globalAlpha = fadeAlpha;

  // Glow
  const glowGrad = ctx.createRadialGradient(cx, cy, 4, cx, cy, 18);
  glowGrad.addColorStop(0, t.color); glowGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = glowGrad;
  ctx.beginPath(); ctx.arc(cx, cy, 18, 0, Math.PI*2); ctx.fill();

  // Backdrop
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.arc(cx, cy, 14, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.arc(cx, cy, 12, 0, Math.PI*2); ctx.fill();

  // Emoji
  ctx.fillStyle = '#fff'; ctx.font = '16px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(t.emoji, cx, cy);

  // Expiry bar
  if (d.life < DROP_LIFETIME * 0.5) {
    const barW = 20 * (d.life / DROP_LIFETIME);
    ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fillRect(cx-10, cy+12, 20, 2);
    ctx.fillStyle = '#fff'; ctx.fillRect(cx-10, cy+12, barW, 2);
  }

  ctx.globalAlpha = 1;
}

function collectPowerups() {
  for (const d of powerupDrops) {
    if (d.life <= 0) continue;
    if (rectsCollide(player, d)) {
      applyPowerup(d.type);
      d.life = 0;
      spawnParticles(d.x + d.w/2, d.y + d.h/2, 10, POWERUP_TYPES[d.type]?.color || '#fff');
    }
  }
  powerupDrops = powerupDrops.filter(d => d.life > 0);
}

function applyPowerup(type) {
  switch (type) {
    case 'heal':
      if (lives < DIFFICULTY[difficulty]?.lives || 5) lives++;
      break;
    case 'speed':
      activeBuffs.speed = 900; // 15秒
      break;
    case 'shield':
      player.invincible = 600; // 10秒无敌
      spawnParticles(player.x+player.w/2, player.y+player.h/2, 20, '#7bed9f');
      break;
    case 'double':
      activeBuffs.double = 1200; // 20秒
      break;
    case 'extraLife':
      lives++;
      break;
    case 'clearAll':
      for (const e of enemies) {
        if (e.alive) {
          e.alive = false;
          spawnParticles(e.x+e.w/2, e.y+e.h/2, 8, '#ff6348');
        }
      }
      shakeTimer = 12; shakeIntensity = 8;
      break;
    case 'slowEnemy':
      activeBuffs.slowEnemy = 600; // 10秒
      break;
  }
}

function updateBuffs() {
  for (const key of Object.keys(activeBuffs)) {
    activeBuffs[key]--;
    if (activeBuffs[key] <= 0) delete activeBuffs[key];
  }
}

function drawBuffUI() {
  let bx = GAME_W - 20;
  for (const [type, remaining] of Object.entries(activeBuffs)) {
    const t = POWERUP_TYPES[type];
    if (!t) continue;
    const sec = Math.ceil(remaining / 60);
    const alpha = remaining < 120 ? 0.5 + Math.sin(Date.now()*0.01)*0.5 : 1;
    ctx.globalAlpha = alpha;
    ctx.font = '15px serif'; ctx.textAlign = 'right';
    ctx.fillText(`${t.emoji} ${sec}s`, bx, 52);
    bx -= 80;
  }
  ctx.globalAlpha = 1;
}

// ==================== Physics ====================
function rectsCollide(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function resolvePlatforms() {
  player.onGround = false;
  for (const p of platforms) {
    if (!rectsCollide(player, p)) continue;
    const ol = (player.x+player.w)-p.x, or = (p.x+p.w)-player.x;
    const ot = (player.y+player.h)-p.y, ob = (p.y+p.h)-player.y;
    if (Math.min(ol, or) < Math.min(ot, ob)) {
      if (ol < or) { player.x = p.x-player.w; } else { player.x = p.x+p.w; }
      player.vx = 0;
    } else {
      if (ot < ob) { player.y = p.y-player.h; player.vy = 0; player.onGround = true; }
      else { player.y = p.y+p.h; player.vy = 0; }
    }
  }
}

function checkEnemyCollisions() {
  if (player.invincible > 0) return;
  for (const e of enemies) {
    if (!e.alive) continue;
    if (!rectsCollide(player, e)) continue;
    const isStomp = player.vy > 0 && (player.y+player.h)-e.y < 18;
    if (isStomp) {
      e.alive = false; player.vy = -7; score += 100 * (activeBuffs.double ? 2 : 1);
      spawnParticles(e.x+e.w/2, e.y+e.h/2, 12, '#ffd700');
      shakeTimer = 8; shakeIntensity = 3;
      if (Math.random() < DROP_CHANCE) spawnPowerupDrop(e.x + e.w/2, e.y + e.h/2);
    } else {
      lives--; player.invincible = 90;
      player.vy = -8; player.vx = (player.x < e.x) ? -6 : 6;
      spawnParticles(player.x+player.w/2, player.y+player.h/2, 15, '#ff6666');
      shakeTimer = 15; shakeIntensity = 6;
      if (lives <= 0) { gameState = STATE.GAMEOVER; }
    }
  }
}

function collectFeathers() {
  for (const f of butterflyFeathers) {
    if (f.collected) continue;
    if (rectsCollide(player, { x: f.x-10, y: f.y-10, w: 20, h: 20 })) {
      f.collected = true; score += 50 * (activeBuffs.double ? 2 : 1);
      spawnParticles(f.x, f.y, 8, '#e8a0d0');
    }
  }
}

// ==================== Update ====================
const GRAVITY = 0.55;
const JUMP_FORCE = -11;
const SHORT_JUMP_FORCE = -5;
const MOVE_SPEED = 4;
const MOVE_ACCEL = 0.35;     // 加速平滑度（每帧加速量，越小越平滑）
const MOVE_FRICTION = 0.85;  // 松开方向键后的惯性保留
const MAX_FALL = 13;
const JUMP_BUFFER_FRAMES = 10;

function update() {
  if (gameState === STATE.START) {
    if (keys['Space'] || keys['ArrowUp'] || keys['KeyW']) {
      gameState = STATE.MODE_SELECT;
      levelTransitionTimer = 0;
      // Clear keys so we don't immediately select a mode
      keys['Space'] = false; keys['ArrowUp'] = false; keys['KeyW'] = false;
      jumpBufferTimer = 0;
    }
    return;
  }

  if (gameState === STATE.MODE_SELECT) {
    if (keys['Mode1'] || keys['Digit1']) { difficulty = 'EASY'; startGame(); return; }
    if (keys['Mode2'] || keys['Digit2']) { difficulty = 'NORMAL'; startGame(); return; }
    if (keys['Mode3'] || keys['Digit3']) { difficulty = 'HARD'; startGame(); return; }
    return;
  }

  if (gameState === STATE.LEVEL_COMPLETE) {
    levelTransitionTimer--;
    if (levelTransitionTimer <= 0 && (keys['Space'] || keys['ArrowUp'] || keys['KeyW'])) { nextLevel(); }
    return;
  }
  if (gameState === STATE.WIN || gameState === STATE.GAMEOVER) {
    levelTransitionTimer--;
    if (levelTransitionTimer <= 30 && (keys['Space'] || keys['ArrowUp'] || keys['KeyW'])) {
      gameState = STATE.MODE_SELECT;
      keys['Space'] = false; keys['ArrowUp'] = false; keys['KeyW'] = false;
      jumpBufferTimer = 0;
    }
    return;
  }
  if (gameState !== STATE.PLAYING) return;

  // Input (smooth acceleration)
  const speedMul = activeBuffs.speed ? 1.5 : 1;
  const targetSpeed = MOVE_SPEED * speedMul;
  if (keys['ArrowLeft'] || keys['KeyA']) {
    player.vx -= MOVE_ACCEL;
    if (player.vx < -targetSpeed) player.vx = -targetSpeed;
    player.facing = -1;
  } else if (keys['ArrowRight'] || keys['KeyD']) {
    player.vx += MOVE_ACCEL;
    if (player.vx > targetSpeed) player.vx = targetSpeed;
    player.facing = 1;
  } else {
    // Natural deceleration
    player.vx *= MOVE_FRICTION;
    if (Math.abs(player.vx) < 0.15) player.vx = 0;
  }

  // Coyote time
  if (player.onGround && !prevOnGround) coyoteTimer = DIFFICULTY[difficulty]?.coyote || 8;
  prevOnGround = player.onGround;
  if (player.onGround) coyoteTimer = DIFFICULTY[difficulty]?.coyote || 8;

  if (jumpBufferTimer > 0) jumpBufferTimer--;

  const jumpPressed = keys['Space'] || keys['ArrowUp'] || keys['KeyW'];

  if (jumpPressed && !jumpHeld && (player.onGround || coyoteTimer > 0)) {
    player.vy = JUMP_FORCE; player.onGround = false;
    coyoteTimer = 0; jumpBufferTimer = 0; jumpHeld = true;
  } else if (jumpPressed && !jumpHeld && player.onGround && jumpBufferTimer > 0) {
    player.vy = JUMP_FORCE; player.onGround = false;
    coyoteTimer = 0; jumpBufferTimer = 0; jumpHeld = true;
  }

  if (!jumpPressed && jumpHeld && player.vy < SHORT_JUMP_FORCE) {
    player.vy = SHORT_JUMP_FORCE; jumpHeld = false;
  }
  if (!jumpPressed) jumpHeld = false;
  if (coyoteTimer > 0 && !player.onGround) coyoteTimer--;

  // Physics
  player.vy += GRAVITY;
  if (player.vy > MAX_FALL) player.vy = MAX_FALL;

  player.x += player.vx;
  const lvlW = platforms._levelWidth || 3000;
  if (player.x < 0) player.x = 0;
  if (player.x > lvlW-player.w) player.x = lvlW-player.w;
  resolvePlatforms();
  player.y += player.vy;
  resolvePlatforms();

  // Fall off
  if (player.y > GAME_H+50) {
    lives--;
    if (lives <= 0) { gameState = STATE.GAMEOVER; levelTransitionTimer = 90; return; }
    player.invincible = 60;
    const d = buildLevel(currentLevel, difficulty);
    player.x = d.spawn.x; player.y = d.spawn.y;
    player.vx = 0; player.vy = 0;
  }

  if (player.invincible > 0) player.invincible--;
  if (Math.abs(player.vx) > 0.5 && player.onGround) player.animTimer++;
  else if (player.onGround) player.animTimer = 0;

  // Attack cooldown
  if (attackCooldown > 0) attackCooldown--;

  // Update buffs
  updateBuffs();

  // Enemies — apply slow buff
  const slowMul = activeBuffs.slowEnemy ? 0.4 : 1;
  for (const e of enemies) {
    if (!e.alive) continue;
    const baseSpeed = e.speed / ((DIFFICULTY[difficulty]?.enemySpeedMul || 1));
    const actualSpeed = (1.5 + currentLevel * 0.3) * (DIFFICULTY[difficulty]?.enemySpeedMul || 1) * slowMul;
    e.x += e.dir * actualSpeed;
    if (e.x <= e.minX || e.x+e.w >= e.maxX) e.dir *= -1;
  }

  // Projectiles
  for (const p of projectiles) {
    p.x += p.vx; p.life--;
    // Check collision with enemies
    for (const e of enemies) {
      if (!e.alive) continue;
      if (rectsCollide({x:p.x-4,y:p.y-4,w:8,h:8}, e)) {
        e.alive = false;
        p.life = 0;
        score += 100 * (activeBuffs.double ? 2 : 1);
        spawnParticles(e.x+e.w/2, e.y+e.h/2, 10, '#ffd700');
        shakeTimer = 5; shakeIntensity = 2;
        // 概率掉落技能包
        if (Math.random() < DROP_CHANCE) {
          spawnPowerupDrop(e.x + e.w/2, e.y + e.h/2);
        }
      }
    }
  }
  projectiles = projectiles.filter(p => p.life > 0);

  // Powerup drops — lifetime
  for (const d of powerupDrops) d.life--;
  powerupDrops = powerupDrops.filter(d => d.life > 0);

  // Collect powerups
  collectPowerups();

  checkEnemyCollisions();
  collectFeathers();

  // Particles
  for (const p of particles) { p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= p.decay; }
  particles = particles.filter(p => p.life > 0);
  if (shakeTimer > 0) shakeTimer--;

  // Camera
  const targetCamX = player.x-GAME_W/2+player.w/2;
  camera.x += (targetCamX-camera.x)*0.12;
  if (camera.x < 0) camera.x = 0;
  if (camera.x > lvlW-GAME_W) camera.x = lvlW-GAME_W;

  // Goal
  if (rectsCollide(player, { x: goal.x, y: goal.y, w: goal.w, h: goal.h })) {
    gameState = STATE.LEVEL_COMPLETE;
    levelTransitionTimer = 70;
    spawnParticles(goal.x, goal.y+goal.h/2, 35, '#ffd700');
    spawnParticles(goal.x, goal.y+goal.h/2, 25, '#e8a0d0');
  }
}

// ==================== Render ====================
function render() {
  ctx.clearRect(0, 0, GAME_W, GAME_H);

  ctx.save();
  if (shakeTimer > 0) {
    ctx.translate((Math.random()-0.5)*shakeIntensity*(shakeTimer/15), (Math.random()-0.5)*shakeIntensity*(shakeTimer/15));
    shakeIntensity *= 0.85;
  }

  drawBackground();

  ctx.save();
  ctx.translate(-camera.x, -camera.y);

  for (const p of platforms) drawPlatform(p);
  drawGoal();

  for (const f of butterflyFeathers) {
    if (f.collected) continue;
    const bob = Math.sin(Date.now()*0.004+f.bobOffset)*4;
    drawButterfly(f.x, f.y+bob, 14, Math.sin(Date.now()*0.01+f.bobOffset)*0.5);
    ctx.fillStyle = 'rgba(230,160,200,0.2)';
    ctx.beginPath(); ctx.arc(f.x, f.y+bob, 15, 0, Math.PI*2); ctx.fill();
  }

  for (const e of enemies) { if (e.alive) drawEnemy(e); }
  for (const p of projectiles) drawProjectile(p);
  for (const d of powerupDrops) drawPowerupDrop(d);
  drawPlayer();

  for (const p of particles) {
    ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.restore(); ctx.restore();

  drawUI();
  if (gameState === STATE.START) drawStartScreen();
  if (gameState === STATE.MODE_SELECT) drawModeSelect();
  if (gameState === STATE.LEVEL_COMPLETE) drawLevelComplete();
  if (gameState === STATE.WIN) drawWinScreen();
  if (gameState === STATE.GAMEOVER) drawGameOver();
}

function drawUI() {
  for (let i = 0; i < lives; i++) drawButterfly(30+i*32, 24, 8, Math.sin(Date.now()*0.01+i)*0.3);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 18px Georgia, SimSun, serif'; ctx.textAlign = 'right';
  ctx.fillText(`${score} 🦋`, GAME_W-20, 30);
  ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = '14px SimSun, Georgia, serif'; ctx.textAlign = 'center';
  const diffName = DIFFICULTY[difficulty]?.name || '';
  ctx.fillText(`${STORY.levelNames[currentLevel] || ''}  [${diffName}]`, GAME_W/2, 24);

  // Buff status
  drawBuffUI();
}

function drawStartScreen() {
  ctx.fillStyle = 'rgba(20,15,35,0.7)'; ctx.fillRect(0, 0, GAME_W, GAME_H);
  const t = Date.now()*0.001;

  ctx.fillStyle = '#e0d0f0'; ctx.font = 'bold 48px SimSun, Georgia, serif'; ctx.textAlign = 'center';
  ctx.fillText('蝶 舞 岚 间', GAME_W/2, GAME_H/2-100);
  ctx.fillStyle = 'rgba(220,200,240,0.8)'; ctx.font = 'italic 20px Georgia, SimSun, serif';
  ctx.fillText('山间有雾，雾中有蝶', GAME_W/2, GAME_H/2-58);

  const bt = t*0.6;
  drawButterfly(GAME_W/2-100+Math.sin(bt)*30, GAME_H/2-30, 18, Math.sin(bt*1.5)*0.6);
  drawButterfly(GAME_W/2+100+Math.cos(bt*0.8)*30, GAME_H/2-26, 14, Math.cos(bt*1.3)*0.6);

  ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = '15px SimSun, Georgia, serif';
  STORY.prologue.split('\n').forEach((line, i) => ctx.fillText(line, GAME_W/2, GAME_H/2+i*24));

  const pulse = Math.sin(t*2)*0.3+0.7;
  ctx.globalAlpha = pulse; ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.font = '16px SimSun, Georgia, serif';
  ctx.fillText('点击屏幕 · 选择游戏模式', GAME_W/2, GAME_H/2+STORY.prologue.split('\n').length*24+35);
  ctx.globalAlpha = 1;

  ctx.font = '12px SimSun, Georgia, serif'; ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fillText('← → 移动    空格 跳跃    J键 攻击    踩/射敌人消灭阻碍', GAME_W/2, GAME_H-30);
}

function drawModeSelect() {
  ctx.fillStyle = 'rgba(20,15,35,0.72)'; ctx.fillRect(0, 0, GAME_W, GAME_H);

  ctx.fillStyle = '#e0d0f0'; ctx.font = 'bold 36px SimSun, Georgia, serif'; ctx.textAlign = 'center';
  ctx.fillText('选择游戏难度', GAME_W/2, 130);

  const modes = [DIFFICULTY.EASY, DIFFICULTY.NORMAL, DIFFICULTY.HARD];
  const keys = ['1', '2', '3'];

  for (let i = 0; i < 3; i++) {
    const mx = GAME_W/2-200+i*200;
    const my = 250;
    const pulse = Math.sin(Date.now()*0.003+i)*0.05+1;

    // Card
    ctx.fillStyle = `rgba(40,30,60,${0.5+pulse*0.15})`;
    ctx.strokeStyle = 'rgba(200,180,220,0.4)'; ctx.lineWidth = 1.5;
    roundedRect(ctx, mx-80, my-70, 160, 200, 12); ctx.fill(); ctx.stroke();

    // Icon
    ctx.font = '48px serif'; ctx.textAlign = 'center';
    ctx.fillText(['🌿','🍂','🔥'][i], mx, my-10);

    // Name
    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px SimSun, Georgia, serif';
    ctx.fillText(modes[i].name, mx, my+30);

    // Lives
    ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.font = '13px SimSun, Georgia, serif';
    let hearts = '';
    for (let h = 0; h < modes[i].lives; h++) hearts += '❤️';
    ctx.fillText(hearts, mx, my+52);

    // Desc
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '12px SimSun, Georgia, serif';
    ctx.fillText(modes[i].desc, mx, my+72);

    // Key hint
    const pulse2 = Math.sin(Date.now()*0.005+i*2)*0.3+0.7;
    ctx.globalAlpha = pulse2;
    ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = 'bold 13px SimSun, Georgia, serif';
    ctx.fillText(`点击选择 / 按 ${keys[i]}`, mx, my+98);
    ctx.globalAlpha = 1;
  }
}

function drawLevelComplete() {
  ctx.fillStyle = 'rgba(20,15,35,0.72)'; ctx.fillRect(0, 0, GAME_W, GAME_H);
  drawButterfly(GAME_W/2, GAME_H/2-80, 36, Math.sin(Date.now()*0.008)*0.5);

  ctx.fillStyle = '#f0d080'; ctx.font = 'bold 34px SimSun, Georgia, serif'; ctx.textAlign = 'center';
  ctx.fillText(`🦋 第${currentLevel+1}幕通关 🦋`, GAME_W/2, GAME_H/2-20);

  ctx.fillStyle = '#fff'; ctx.font = '16px SimSun, Georgia, serif';
  const msg = STORY.levelEpilogues[currentLevel] || '';
  const lines = msg.split('\n');
  lines.forEach((line, i) => ctx.fillText(line, GAME_W/2, GAME_H/2+i*28));

  if (levelTransitionTimer < 50) {
    ctx.globalAlpha = Math.sin(Date.now()*0.003*2)*0.3+0.7;
    ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = '14px SimSun, Georgia, serif';
    ctx.fillText('点击屏幕 / 空格键 继续前行', GAME_W/2, GAME_H/2+lines.length*28+25);
    ctx.globalAlpha = 1;
  }
}

function drawWinScreen() {
  ctx.fillStyle = 'rgba(20,12,35,0.8)'; ctx.fillRect(0, 0, GAME_W, GAME_H);

  for (let i = 0; i < 14; i++) {
    const bx = (i*83+50)%GAME_W, by = GAME_H+50-((Date.now()*0.025+i*280)%(GAME_H+150));
    ctx.globalAlpha = by>0&&by<GAME_H ? 0.4 : 0;
    drawButterfly(bx, by, 8+(i%4)*3, Math.sin(Date.now()*0.015+i)*0.7);
  }
  ctx.globalAlpha = 1;

  const cX = GAME_W/2-230, cY = 30, cW = 460, cH = 480;
  ctx.fillStyle = '#faf5f0'; ctx.shadowColor = 'rgba(0,0,0,0.35)'; ctx.shadowBlur = 35;
  ctx.fillRect(cX, cY, cW, cH); ctx.shadowBlur = 0;
  ctx.strokeStyle = '#d4b8c8'; ctx.lineWidth = 3;
  ctx.strokeRect(cX+8, cY+8, cW-16, cH-16);
  ctx.strokeStyle = '#e8d0e0'; ctx.lineWidth = 1;
  ctx.strokeRect(cX+18, cY+18, cW-36, cH-36);

  ctx.fillStyle = '#b87090'; ctx.font = 'bold 24px SimSun, Georgia, serif'; ctx.textAlign = 'center';
  ctx.fillText('💌 致我的小蝴蝶', GAME_W/2, cY+48);

  ctx.strokeStyle = '#d4b8c8'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cX+70, cY+58); ctx.lineTo(cX+cW-70, cY+58); ctx.stroke();

  ctx.fillStyle = '#5a4a5a'; ctx.font = '14px SimSun, Georgia, serif';
  STORY.loveLetter.split('\n').forEach((line, i) => { if (i<20) ctx.fillText(line, GAME_W/2, cY+82+i*21); });

  if (levelTransitionTimer < 30) {
    ctx.globalAlpha = Math.sin(Date.now()*0.003*2)*0.3+0.7;
    ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.font = '13px SimSun, Georgia, serif';
    ctx.fillText('点击屏幕 选择模式再玩一次', GAME_W/2, GAME_H-12);
    ctx.globalAlpha = 1;
  }

  const orbT = Date.now()*0.0006;
  for (let i = 0; i < 8; i++) {
    const angle = orbT+(i/8)*Math.PI*2;
    drawButterfly(GAME_W/2+Math.cos(angle)*(cW/2+38), cY+cH/2+Math.sin(angle)*(cH/2+38), 9+Math.sin(orbT+i)*2, Math.cos(orbT*1.4+i)*0.5);
  }
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(15,10,30,0.78)'; ctx.fillRect(0, 0, GAME_W, GAME_H);
  ctx.fillStyle = '#d0a0c0'; ctx.font = 'bold 34px SimSun, Georgia, serif'; ctx.textAlign = 'center';
  ctx.fillText('雾未散，蝶未远', GAME_W/2, GAME_H/2-20);
  ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = '16px SimSun, Georgia, serif';
  ctx.fillText('岚岚不会放弃，正如我不会放弃你', GAME_W/2, GAME_H/2+25);
  if (levelTransitionTimer < 30) {
    ctx.globalAlpha = Math.sin(Date.now()*0.003*2)*0.3+0.7;
    ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = '14px SimSun, Georgia, serif';
    ctx.fillText('点击屏幕 选择模式重新出发', GAME_W/2, GAME_H/2+60);
    ctx.globalAlpha = 1;
  }
}

// ==================== Game Flow ====================
function startGame() {
  currentLevel = 0; score = 0;
  lives = DIFFICULTY[difficulty]?.lives || 5;
  loadLevel(0);
  coyoteTimer = 0; jumpBufferTimer = 0; jumpHeld = false; prevOnGround = false;
  gameState = STATE.PLAYING;
}

function nextLevel() {
  currentLevel++;
  if (currentLevel >= totalLevels) { gameState = STATE.WIN; levelTransitionTimer = 90; }
  else { loadLevel(currentLevel); gameState = STATE.PLAYING; }
}

// ==================== Loop ====================
function gameLoop() {
  update();
  render();
  // 只在游戏中显示虚拟按键
  const ctrls = document.getElementById('mobile-controls');
  if (ctrls) ctrls.style.display = (gameState === STATE.PLAYING) ? 'flex' : 'none';
  requestAnimationFrame(gameLoop);
}

loadLevel(0);
gameLoop();
</script>
