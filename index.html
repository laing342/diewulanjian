<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>蝶舞岚间</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="蝶舞岚间">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#1a1a2e;display:flex;flex-direction:column;justify-content:center;align-items:center;
    height:100vh;height:100dvh;overflow:hidden;
    font-family:'Georgia','SimSun','STSong',serif;
    touch-action:manipulation;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;
  }
  #game-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;max-height:100vh;max-height:100dvh;}
  canvas{display:block;border-radius:8px;box-shadow:0 0 40px rgba(180,160,220,0.35);flex-shrink:1;max-width:100vw;}
  #mobile-controls{
    display:none;width:100%;max-width:500px;
    justify-content:space-between;align-items:center;padding:4px 12px;gap:4px;
  }
  .ctrl-group{display:flex;gap:10px}
  .ctrl-btn{
    width:50px;height:50px;border-radius:50%;
    border:2px solid rgba(255,255,255,0.35);background:rgba(255,255,255,0.08);
    color:white;font-size:22px;display:flex;align-items:center;justify-content:center;
    backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  }
  .ctrl-btn:active{background:rgba(255,255,255,0.25)}
  .ctrl-btn.jump{width:68px;height:68px;background:rgba(180,150,220,0.2);border-color:rgba(180,150,220,0.45);font-size:28px}
  .ctrl-btn.atk{background:rgba(255,200,100,0.15);border-color:rgba(255,200,100,0.4)}
  #music-btn{
    position:absolute;top:8px;right:8px;z-index:10;
    width:36px;height:36px;border-radius:50%;
    border:1px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.35);
    color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  }
  #game-container{position:relative;display:flex;justify-content:center;align-items:center}
  @media (max-width:768px){
    #mobile-controls{display:flex}
    canvas{border-radius:4px}
  }
</style>
</head>
<body>
<div id="game-wrap">
  <div id="game-container">
    <canvas id="game"></canvas><button id="music-btn" onclick="toggleMusic()" title="音乐">🎵</button>
  </div>
  <div id="mobile-controls">
    <div class="ctrl-group">
      <button class="ctrl-btn" id="btn-left">◀</button>
      <button class="ctrl-btn" id="btn-right">▶</button>
    </div>
    <div class="ctrl-group">
      <button class="ctrl-btn atk" id="btn-attack">⚔</button>
    </div>
    <div class="ctrl-group">
      <button class="ctrl-btn jump" id="btn-jump">▲</button>
    </div>
  </div>
</div>
<script>
// Service Worker
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');

// ==================== 🦋 故事配置 ====================
const STORY={
  herName:'蝶蝶',yourName:'岚岚',
  title:'蝶舞岚间',subtitle:'山间有雾，雾中有蝶',
  prologue:'岚岚是山间的一缕雾，蝶蝶是雾中飞舞的一只蝴蝶。\n岚岚总在清晨出现，只为等蝶蝶穿过他的那一刻。\n\n有一天，一阵风把蝶蝶吹去了远方……\n岚岚决定离开这片山，去找她回来。',
  levelNames:['第一幕 · 山间初遇','第二幕 · 雾起同行','第三幕 · 风急蝶惊','第四幕 · 穿山越岭','第五幕 · 星河暗涌','第六幕 · 岚归蝶舞'],
  levelEpilogues:[
    '那是一个春天的清晨，山雾正浓，\n一只小蝴蝶落在了岚岚的手心。\n他第一次知道了心跳的声音。',
    '他们一起穿过薄雾，越过小溪。\n岚岚觉得，只要有蝶蝶在，\n这个世界就没有什么好怕的。',
    '风忽然大了，蝶蝶被吹得摇摆不定。\n岚岚拼命伸出手——\n"抓住我！我不会松开的！"',
    '这是一段漫长的路。\n怀疑、距离、时间——每一个都想阻挡他。\n但他知道，蝶蝶就在前方。',
    '夜幕降临，满天星辰。\n岚岚已经走了很远很远，\n可他一点都不觉得累。',
    '他终于找到了她——\n蝴蝶停在最初的枝头，翅膀轻轻扇动。\n雾散去，阳光洒下，他们再也不会分开。',
  ],
  loveLetter:[
    '亲爱的蝶蝶：','','我是岚岚，那缕笨拙的山雾。','',
    '遇见你之前，','我以为自己只是一阵风，','飘过就算。','',
    '可是你来了——','一只小蝴蝶，','轻轻扇了扇翅膀，','我的整个世界都变了。','',
    '你知道吗？','雾是因为有了光才会散，','而你就是我的光。','',
    '每一次见你笑，','就像清晨第一缕阳光穿过雾气，','温柔得让我不想飘走。','',
    '我想一直这样，','守在你的旁边，','做你专属的山雾。','',
    '蝶舞岚间，岚随蝶动。','蝴蝶在哪里，雾就在哪里。','',
    '我爱你，蝶蝶。','','—— 永远爱你的岚岚',
  ].join('\n'),
};

const DIFFICULTY={
  EASY:{name:'🌿 简单',lives:7,enemySpeedMul:0.65,enemyCountMul:0.6,coyote:12,desc:'轻轻松松，慢慢走'},
  NORMAL:{name:'🍂 普通',lives:5,enemySpeedMul:1.0,enemyCountMul:1.0,coyote:8,desc:'正常挑战，刚刚好'},
  HARD:{name:'🔥 困难',lives:3,enemySpeedMul:1.4,enemyCountMul:1.3,coyote:4,desc:'高难挑战，全力以赴'},
};

const POWERUP_TYPES={
  heal:{name:'回血',emoji:'❤️',color:'#ff4757',weight:22,desc:'回复1点生命'},
  speed:{name:'加速',emoji:'⚡',color:'#ffd700',weight:18,desc:'15秒移动加速',duration:900},
  shield:{name:'无敌',emoji:'🛡️',color:'#7bed9f',weight:15,desc:'10秒无敌护盾',duration:600},
  double:{name:'双倍',emoji:'⭐',color:'#ffa502',weight:15,desc:'20秒双倍分数',duration:1200},
  extraLife:{name:'加命',emoji:'🦋',color:'#ff69b4',weight:10,desc:'增加1条命'},
  clearAll:{name:'全清',emoji:'💥',color:'#ff6348',weight:8,desc:'消灭屏幕所有敌人'},
  slowEnemy:{name:'迟缓',emoji:'🐌',color:'#a4b0be',weight:12,desc:'10秒敌人减速',duration:600},
};
const DROP_CHANCE=0.4,DROP_LIFETIME=600;

// ==================== Music ====================
let musicOn=false,musicCtx=null,musicGain=null,musicInterval=null;
const SONG=[
  // Sweet melody: notes [freq, duration in beats, rest after]
  [523,0.25],[659,0.25],[784,0.5],[659,0.25],[784,0.5],[659,0.25],[523,0.75],[0,0.25],
  [587,0.25],[698,0.25],[784,0.5],[698,0.25],[784,0.5],[698,0.25],[587,0.75],[0,0.25],
  [523,0.25],[659,0.25],[784,0.75],[880,0.25],[784,0.25],[659,0.5],[523,0.5],[0,0.5],
  [784,0.25],[880,0.25],[988,1.0],[784,0.25],[659,0.5],[523,0.75],[0,0.25],
  [587,0.25],[523,0.25],[587,0.5],[659,0.5],[523,0.5],[440,0.5],[392,0.75],[0,0.25],
  [523,0.25],[659,0.25],[784,0.5],[659,0.5],[523,0.5],[587,0.5],[523,1.0],[0,1.0],
];
let songPos=0,songBeatTime=0;
const BPM=100,BEAT_MS=60000/BPM;

function initMusic(){if(!musicCtx){musicCtx=new(window.AudioContext||window.webkitAudioContext)();musicGain=musicCtx.createGain();musicGain.gain.value=0.08;musicGain.connect(musicCtx.destination);}}
function playNote(freq,dur){
  if(!musicCtx||!musicOn)return;
  const t=musicCtx.currentTime;
  if(freq>0){
    const o=musicCtx.createOscillator();const g=musicCtx.createGain();
    o.type='sine';o.frequency.value=freq;g.gain.value=0;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.7,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.3,t+dur*0.5);
    g.gain.linearRampToValueAtTime(0,t+dur);
    o.connect(g);g.connect(musicGain);o.start(t);o.stop(t+dur);
    // Add soft harmony
    const h=musicCtx.createOscillator();const hg=musicCtx.createGain();
    h.type='sine';h.frequency.value=freq*1.5;hg.gain.value=0;
    hg.gain.setValueAtTime(0,t);hg.gain.linearRampToValueAtTime(0.2,t+0.03);
    hg.gain.exponentialRampToValueAtTime(0.05,t+dur*0.5);
    hg.gain.linearRampToValueAtTime(0,t+dur);
    h.connect(hg);hg.connect(musicGain);h.start(t);h.stop(t+dur);
  }
}
function musicLoop(){
  if(!musicOn)return;
  const[songNote]=SONG[songPos];
  const dur=songNote===0?SONG[songPos][1]*BEAT_MS:SONG[songPos][1]*BEAT_MS;
  playNote(songNote,dur/1000);
  songBeatTime+=SONG[songPos][1];
  songPos=(songPos+1)%SONG.length;
  if(songPos===0)songBeatTime=0;
  if(musicInterval)clearTimeout(musicInterval);
  musicInterval=setTimeout(musicLoop,dur);
}
function toggleMusic(){
  initMusic();
  if(musicOn){musicOn=false;if(musicInterval)clearTimeout(musicInterval);document.getElementById('music-btn').textContent='🔇';}
  else{
    musicOn=true;songPos=0;songBeatTime=0;document.getElementById('music-btn').textContent='🎵';
    if(musicCtx.state==='suspended')musicCtx.resume();
    musicLoop();
  }
}

// ==================== Canvas ====================
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const GAME_W=960,GAME_H=540;
canvas.width=GAME_W;canvas.height=GAME_H;

function resize(){
  const maxH=window.innerHeight*0.85;
  const scale=Math.min(window.innerWidth/GAME_W,maxH/GAME_H)*0.96;
  canvas.style.width=(GAME_W*scale)+'px';canvas.style.height=(GAME_H*scale)+'px';
}
window.addEventListener('resize',resize);resize();

// ==================== Input ====================
const keys={};
window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();jumpBufferTimer=JUMP_BUFFER_FRAMES;}
  if(e.code==='Digit1'){difficulty='EASY';if(gameState===STATE.MODE_SELECT)startGame();}
  if(e.code==='Digit2'){difficulty='NORMAL';if(gameState===STATE.MODE_SELECT)startGame();}
  if(e.code==='Digit3'){difficulty='HARD';if(gameState===STATE.MODE_SELECT)startGame();}
  if(e.code==='KeyJ'){e.preventDefault();tryAttack();}
  if(e.code==='KeyM'){toggleMusic();}
});
window.addEventListener('keyup',e=>{keys[e.code]=false;if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW')jumpHeld=false;});

function setupMobileButton(id,key){
  const btn=document.getElementById(id);if(!btn)return;
  btn.addEventListener('pointerdown',e=>{e.preventDefault();keys[key]=true;if(key==='Space'){jumpBufferTimer=JUMP_BUFFER_FRAMES;}if(key==='Attack')tryAttack();});
  btn.addEventListener('pointerup',e=>{e.preventDefault();keys[key]=false;if(key==='Space')jumpHeld=false;});
  btn.addEventListener('pointerleave',e=>{keys[key]=false;if(key==='Space')jumpHeld=false;});
}
setupMobileButton('btn-left','ArrowLeft');setupMobileButton('btn-right','ArrowRight');
setupMobileButton('btn-jump','Space');setupMobileButton('btn-attack','Attack');

canvas.addEventListener('click',e=>handleCanvasTap(e));
canvas.addEventListener('touchend',e=>{e.preventDefault();if(e.changedTouches.length===1)handleCanvasTap(e.changedTouches[0]);});

function getCanvasPos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*(GAME_W/r.width),y:(e.clientY-r.top)*(GAME_H/r.height)};}

function handleCanvasTap(e){
  const p=getCanvasPos(e);
  if(gameState===STATE.START){gameState=STATE.MODE_SELECT;return;}
  if(gameState===STATE.MODE_SELECT){
    for(let i=0;i<3;i++){const mx=GAME_W/2-200+i*200,my=250;if(p.x>mx-80&&p.x<mx+80&&p.y>my-70&&p.y<my+130){difficulty=['EASY','NORMAL','HARD'][i];startGame();return;}}
    return;
  }
  if(gameState===STATE.LEVEL_COMPLETE&&levelTransitionTimer<=0){nextLevel();return;}
  if((gameState===STATE.WIN||gameState===STATE.GAMEOVER)&&levelTransitionTimer<=30){gameState=STATE.MODE_SELECT;return;}
}
document.getElementById('music-btn').addEventListener('click',e=>{e.stopPropagation();});

// ==================== State ====================
const STATE={START:0,MODE_SELECT:1,PLAYING:2,LEVEL_COMPLETE:3,WIN:4,GAMEOVER:5};
let gameState=STATE.START,currentLevel=0,score=0,lives=5,difficulty='NORMAL';
let levelTransitionTimer=0,shakeTimer=0,shakeIntensity=0,totalLevels=6;
let player={x:0,y:-100,w:32,h:38,vx:0,vy:0,onGround:false,facing:1,animTimer:0,invincible:0,trailTimer:0};
let lastCheckpoint={x:40,y:400};  // 存档点，死后从这里复活
let coyoteTimer=0,jumpBufferTimer=0,jumpHeld=false,prevOnGround=false,attackCooldown=0;
let activeBuffs={},camera={x:0,y:0},goal={x:0,y:0,w:24,h:80};
let platforms=[],butterflyFeathers=[],enemies=[],particles=[],projectiles=[],powerupDrops=[];

// ==================== Drawing ====================
function drawHeart(cx,cy,size,color){
  ctx.fillStyle=color;ctx.beginPath();const s=size/2;
  ctx.moveTo(cx,cy+s*0.3);ctx.bezierCurveTo(cx,cy-s*0.3,cx-s,cy-s*0.3,cx-s,cy+s*0.3);
  ctx.bezierCurveTo(cx-s,cy+s*0.9,cx,cy+s*1.3,cx,cy+s*1.5);ctx.bezierCurveTo(cx,cy+s*1.3,cx+s,cy+s*0.9,cx+s,cy+s*0.3);
  ctx.bezierCurveTo(cx+s,cy-s*0.3,cx,cy-s*0.3,cx,cy+s*0.3);ctx.fill();
}
function roundedRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
function drawButterfly(cx,cy,size,wingAngle){
  ctx.save();ctx.translate(cx,cy);const wa=wingAngle||Math.sin(Date.now()*0.008)*0.4;
  ctx.fillStyle='#e8a0d0';
  ctx.beginPath();ctx.ellipse(-4,-2,size*0.5,size*0.3,-0.3-wa,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(4,-2,size*0.5,size*0.3,0.3+wa,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f0c8e8';
  ctx.beginPath();ctx.ellipse(-3,2,size*0.35,size*0.22,-0.5-wa*0.6,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(3,2,size*0.35,size*0.22,0.5+wa*0.6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.beginPath();ctx.arc(-4,-3,size*0.12,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(4,-3,size*0.12,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#b07090';ctx.fillRect(-1,-size*0.4,2,size*0.8);
  ctx.strokeStyle='#b07090';ctx.lineWidth=0.8;ctx.beginPath();ctx.moveTo(0,-size*0.35);ctx.quadraticCurveTo(-3,-size*0.6,-4,-size*0.7);ctx.moveTo(0,-size*0.35);ctx.quadraticCurveTo(3,-size*0.6,4,-size*0.7);ctx.stroke();ctx.restore();
}
function drawPlayer(){
  // 受伤闪烁 — 白色闪光但不消失
  if(player.invincible>0&&player.invincible<60&&Math.floor(player.invincible*10)%2===0){ctx.globalAlpha=0.35;}
  const{x,y,w,h}=player;const cx=x+w/2,cy=y+h/2;ctx.save();ctx.translate(cx,cy);if(player.facing===-1)ctx.scale(-1,1);
  const bob=player.onGround?Math.sin(player.animTimer*0.3)*2:0;
  if(player.onGround||Math.abs(player.vx)>0.5){ctx.fillStyle='rgba(200,190,220,0.25)';ctx.beginPath();ctx.arc(-4,h/2-2,10+Math.sin(Date.now()*0.01)*3,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(210,200,230,0.18)';ctx.beginPath();ctx.arc(-8,h/2+2,6,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle='#c8bfd8';const fo=player.onGround?Math.sin(player.animTimer*0.3)*4:2;ctx.fillRect(-10,h/2-6+bob,8,7);ctx.fillRect(2,h/2-6-fo+bob,8,7);
  const bg=ctx.createRadialGradient(0,-2,4,0,0,16);bg.addColorStop(0,'#d8d0f0');bg.addColorStop(0.6,'#b8a8d8');bg.addColorStop(1,'#9888b8');ctx.fillStyle=bg;ctx.beginPath();ctx.arc(0,-2+bob,15,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(220,210,240,0.3)';ctx.beginPath();ctx.arc(0,-2+bob,13,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-5,-6+bob,6.5,0,Math.PI*2);ctx.arc(5,-6+bob,6.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3a3060';ctx.beginPath();ctx.arc(-4,-5+bob,2.8,0,Math.PI*2);ctx.arc(6,-5+bob,2.8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-5,-6.5+bob,1.2,0,Math.PI*2);ctx.arc(5,-6.5+bob,1.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(200,160,180,0.45)';ctx.beginPath();ctx.arc(-9,-1+bob,3.5,0,Math.PI*2);ctx.arc(9,-1+bob,3.5,0,Math.PI*2);ctx.fill();
  if(player.invincible>60){ctx.strokeStyle=`rgba(123,237,159,${0.3+Math.sin(Date.now()*0.01)*0.2})`;ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,-2+bob,20,0,Math.PI*2);ctx.stroke();}
  if(player.trailTimer%6===0)particles.push({x:x+w/2+(Math.random()-0.5)*20,y:y+h,vx:(Math.random()-0.5)*1.5,vy:-1-Math.random()*2,life:1,decay:0.03,color:'rgba(200,190,220,',size:3+Math.random()*3});
  player.trailTimer++;ctx.restore();ctx.globalAlpha=1;
}
function drawEnemy(e){
  ctx.save();ctx.translate(e.x+e.w/2,e.y+e.h/2);ctx.fillStyle='rgba(0,0,0,0.15)';ctx.beginPath();ctx.ellipse(0,e.h/2-2,e.w*0.38,3,0,0,Math.PI*2);ctx.fill();
  const colors={'怀疑':['#5a4a6a','#2a1a3a'],'距离':['#4a5a6a','#1a2a3a'],'时间':['#6a5a4a','#3a2a1a'],'孤独':['#5a2a3a','#3a0a1a'],'恐惧':['#3a5a3a','#1a3a1a']};
  const[c1,c2]=colors[e.label]||colors['怀疑'];const g=ctx.createRadialGradient(0,-2,2,0,0,e.w/2);g.addColorStop(0,c1);g.addColorStop(1,c2);ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,e.w/2-2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(30,15,50,0.5)';for(let i=0;i<(e.isFast?7:6);i++){const a=(i/(e.isFast?7:6))*Math.PI*2;ctx.beginPath();ctx.arc(Math.cos(a)*(e.w/2-1),Math.sin(a)*(e.h/2-1)-1,e.isFast?3:5,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-5,-3,5.5,0,Math.PI*2);ctx.arc(5,-3,5.5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#1a0a2a';ctx.beginPath();ctx.arc(-4,-2,2.5,0,Math.PI*2);ctx.arc(6,-2,2.5,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#1a0a2a';ctx.lineWidth=1.8;ctx.beginPath();ctx.moveTo(-9,-8);ctx.lineTo(-3,-6);ctx.moveTo(3,-6);ctx.lineTo(9,-8);ctx.stroke();

    {width:4500,ground:[[0,460,260],[340,460,150],[570,460,190],[840,460,160],[1080,460,240],[1400,460,170],[1650,460,300],[2030,460,200],[2310,460,340],[2730,460,220],[3030,460,310],[3420,460,350],[3850,460,300],[4230,460,440]],floating:[[230,380,140],[450,330,140],[710,290,130],[960,350,140],[1270,300,160],[1520,370,150],[1880,310,150],[2180,280,140],[2580,340,160],[2900,300,150],[3280,340,160],[3650,290,160],[4020,330,150]],feathers:[[270,340],[490,290],[750,250],[1000,310],[1130,420],[1310,260],[1480,420],[1560,340],[1750,420],[1930,290],[2100,420],[2220,260],[2450,420],[2620,320],[2800,420],[2950,270],[3120,420],[3320,310],[3500,420],[3700,260],[3920,420],[4100,290]],goal:[4270,380],spawn:[40,400]},
    {width:5000,ground:[[0,460,250],[330,460,140],[550,460,180],[810,460,150],[1040,460,230],[1350,460,170],[1600,460,290],[1970,460,200],[2250,460,340],[2670,460,210],[2960,460,310],[3350,460,350],[3780,460,300],[4160,460,400],[4640,460,440]],floating:[[220,380,140],[430,330,150],[690,280,130],[940,340,140],[1230,290,160],[1470,370,150],[1830,300,150],[2120,270,140],[2520,340,160],[2840,290,150],[3220,330,160],[3600,280,170],[3980,320,150],[4400,280,160]],feathers:[[260,340],[470,290],[730,240],[980,300],[1100,420],[1280,260],[1420,420],[1520,340],[1700,420],[1870,290],[2050,420],[2160,260],[2400,420],[2570,320],[2750,420],[2890,270],[3060,420],[3260,310],[3440,420],[3650,260],[3850,420],[4040,300],[4230,420],[4450,260]],goal:[4680,380],spawn:[40,400]},
  ];
  const d=levelData[Math.min(index,5)]||levelData[0];
  return{width:d.width,platforms:d.ground.map(p=>({x:p[0],y:p[1],w:p[2],h:80})).concat(d.floating.map(p=>({x:p[0],y:p[1],w:p[2],h:24}))),feathers:d.feathers.map(p=>({x:p[0],y:p[1]})),enemies:selectedEnemies,goal:{x:d.goal[0],y:d.goal[1]},spawn:{x:d.spawn[0],y:d.spawn[1]},checkpoints:cpX};
}

function loadLevel(index){
  const data=buildLevel(index,difficulty);platforms=data.platforms;
  butterflyFeathers=data.feathers.map(h=>({...h,collected:false,bobOffset:Math.random()*Math.PI*2}));
  enemies=data.enemies.map(e=>({...e,alive:true,dir:1,speed:(1.5+index*0.25)*(DIFFICULTY[difficulty]?.enemySpeedMul||1)}));
  goal.x=data.goal.x;goal.y=data.goal.y;player.x=data.spawn.x;player.y=data.spawn.y;
  player.vx=0;player.vy=0;player.onGround=false;player.invincible=0;
  lastCheckpoint=data.spawn;  // 新关卡从起点存档
  platforms._checkpoints=data.checkpoints||[];  // 关卡存档点
  coyoteTimer=0;jumpBufferTimer=0;jumpHeld=false;prevOnGround=false;attackCooldown=0;activeBuffs={};projectiles=[];powerupDrops=[];
  particles=[];camera.x=0;camera.y=0;platforms._levelWidth=data.width;
}

// ==================== Physics ====================
function rectsCollide(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function resolvePlatforms(){
  player.onGround=false;for(const p of platforms){if(!rectsCollide(player,p))continue;const ol=(player.x+player.w)-p.x,or=(p.x+p.w)-player.x,ot=(player.y+player.h)-p.y,ob=(p.y+p.h)-player.y;if(Math.min(ol,or)<Math.min(ot,ob)){if(ol<or){player.x=p.x-player.w;}else{player.x=p.x+p.w;}player.vx=0;}else{if(ot<ob){player.y=p.y-player.h;player.vy=0;player.onGround=true;}else{player.y=p.y+p.h;player.vy=0;}}}
}
function checkEnemyCollisions(){
  if(player.invincible>0)return;for(const e of enemies){if(!e.alive)continue;if(!rectsCollide(player,e))continue;const isStomp=player.vy>0&&(player.y+player.h)-e.y<18;if(isStomp){e.alive=false;player.vy=-7;score+=100*(activeBuffs.double?2:1);spawnParticles(e.x+e.w/2,e.y+e.h/2,12,'#ffd700');shakeTimer=8;shakeIntensity=3;if(Math.random()<DROP_CHANCE)spawnPowerupDrop(e.x+e.w/2,e.y+e.h/2);}else{lives--;player.invincible=90;player.vy=-8;player.vx=(player.x<e.x)?-6:6;spawnParticles(player.x+player.w/2,player.y+player.h/2,15,'#ff6666');shakeTimer=15;shakeIntensity=6;if(lives<=0){gameState=STATE.GAMEOVER;}}}
}
function collectFeathers(){for(const f of butterflyFeathers){if(f.collected)continue;if(rectsCollide(player,{x:f.x-10,y:f.y-10,w:20,h:20})){f.collected=true;score+=50*(activeBuffs.double?2:1);spawnParticles(f.x,f.y,8,'#e8a0d0');}}}

// ==================== Update ====================
const GRAVITY=0.55,JUMP_FORCE=-11,SHORT_JUMP_FORCE=-5,MOVE_SPEED=4,MOVE_ACCEL=0.35,MOVE_FRICTION=0.85,MAX_FALL=13,JUMP_BUFFER_FRAMES=10;
function update(){
  if(gameState===STATE.START){if(keys['Space']||keys['ArrowUp']||keys['KeyW']){gameState=STATE.MODE_SELECT;keys['Space']=false;keys['ArrowUp']=false;keys['KeyW']=false;jumpBufferTimer=0;}return;}
  if(gameState===STATE.MODE_SELECT){return;}
  if(gameState===STATE.LEVEL_COMPLETE){levelTransitionTimer--;if(levelTransitionTimer<=0&&(keys['Space']||keys['ArrowUp']||keys['KeyW']))nextLevel();return;}
  if(gameState===STATE.WIN||gameState===STATE.GAMEOVER){levelTransitionTimer--;if(levelTransitionTimer<=30&&(keys['Space']||keys['ArrowUp']||keys['KeyW'])){gameState=STATE.MODE_SELECT;keys['Space']=false;keys['ArrowUp']=false;keys['KeyW']=false;jumpBufferTimer=0;}return;}
  if(gameState!==STATE.PLAYING)return;
  // Input
  const speedMul=activeBuffs.speed?1.5:1,targetSpeed=MOVE_SPEED*speedMul;
  if(keys['ArrowLeft']||keys['KeyA']){player.vx-=MOVE_ACCEL;if(player.vx<-targetSpeed)player.vx=-targetSpeed;player.facing=-1;}
  else if(keys['ArrowRight']||keys['KeyD']){player.vx+=MOVE_ACCEL;if(player.vx>targetSpeed)player.vx=targetSpeed;player.facing=1;}
  else{player.vx*=MOVE_FRICTION;if(Math.abs(player.vx)<0.15)player.vx=0;}
  // Coyote
  if(player.onGround&&!prevOnGround)coyoteTimer=DIFFICULTY[difficulty]?.coyote||8;prevOnGround=player.onGround;if(player.onGround)coyoteTimer=DIFFICULTY[difficulty]?.coyote||8;
  if(jumpBufferTimer>0)jumpBufferTimer--;
  const jumpPressed=keys['Space']||keys['ArrowUp']||keys['KeyW'];
  if(jumpPressed&&!jumpHeld&&(player.onGround||coyoteTimer>0)){player.vy=JUMP_FORCE;player.onGround=false;coyoteTimer=0;jumpBufferTimer=0;jumpHeld=true;}
  else if(jumpPressed&&!jumpHeld&&player.onGround&&jumpBufferTimer>0){player.vy=JUMP_FORCE;player.onGround=false;coyoteTimer=0;jumpBufferTimer=0;jumpHeld=true;}
  if(!jumpPressed&&jumpHeld&&player.vy<SHORT_JUMP_FORCE){player.vy=SHORT_JUMP_FORCE;jumpHeld=false;}if(!jumpPressed)jumpHeld=false;if(coyoteTimer>0&&!player.onGround)coyoteTimer--;
  // Physics
  player.vy+=GRAVITY;if(player.vy>MAX_FALL)player.vy=MAX_FALL;player.x+=player.vx;const lvlW=platforms._levelWidth||3000;if(player.x<0)player.x=0;if(player.x>lvlW-player.w)player.x=lvlW-player.w;resolvePlatforms();player.y+=player.vy;resolvePlatforms();
  // Fall
  if(player.y>GAME_H+50){lives--;if(lives<=0){gameState=STATE.GAMEOVER;levelTransitionTimer=90;return;}player.invincible=120;player.x=lastCheckpoint.x;player.y=lastCheckpoint.y-80;player.vx=0;player.vy=-6;spawnParticles(player.x+player.w/2,player.y,15,'#d0c0f0');}
  if(player.invincible>0)player.invincible--;if(Math.abs(player.vx)>0.5&&player.onGround)player.animTimer++;else if(player.onGround)player.animTimer=0;
  // 存档点：走过就自动保存
  const cps=platforms._checkpoints||[];for(const cx of cps){if(player.x>cx&&lastCheckpoint.x<cx){lastCheckpoint={x:cx,y:player.y<200?200:player.y};spawnParticles(cx,player.y,6,'#d0f0d0');}}
  if(attackCooldown>0)attackCooldown--;
  updateBuffs();
  // Enemies
  const slowMul=activeBuffs.slowEnemy?0.35:1;
  for(const e of enemies){if(!e.alive)continue;const s=e.speed*slowMul;e.x+=e.dir*s;if(e.x<=e.minX||e.x+e.w>=e.maxX)e.dir*=-1;}
  // Projectiles
  for(const p of projectiles){p.x+=p.vx;p.life--;for(const e of enemies){if(!e.alive)continue;if(rectsCollide({x:p.x-4,y:p.y-4,w:8,h:8},e)){e.alive=false;p.life=0;score+=100*(activeBuffs.double?2:1);spawnParticles(e.x+e.w/2,e.y+e.h/2,10,'#ffd700');shakeTimer=5;shakeIntensity=2;if(Math.random()<DROP_CHANCE)spawnPowerupDrop(e.x+e.w/2,e.y+e.h/2);}}}projectiles=projectiles.filter(p=>p.life>0);
  // Drops
  for(const d of powerupDrops)d.life--;powerupDrops=powerupDrops.filter(d=>d.life>0);collectPowerups();
  checkEnemyCollisions();collectFeathers();
  // Particles
  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life-=p.decay;}particles=particles.filter(p=>p.life>0);if(shakeTimer>0)shakeTimer--;
  // Camera
  const tcx=player.x-GAME_W/2+player.w/2;camera.x+=(tcx-camera.x)*0.12;if(camera.x<0)camera.x=0;if(camera.x>lvlW-GAME_W)camera.x=lvlW-GAME_W;
  // Goal
  if(rectsCollide(player,{x:goal.x,y:goal.y,w:goal.w,h:goal.h})){gameState=STATE.LEVEL_COMPLETE;levelTransitionTimer=70;spawnParticles(goal.x,goal.y+goal.h/2,35,'#ffd700');spawnParticles(goal.x,goal.y+goal.h/2,25,'#e8a0d0');}
}

// ==================== Render ====================
function render(){
  ctx.clearRect(0,0,GAME_W,GAME_H);
  ctx.save();if(shakeTimer>0){ctx.translate((Math.random()-0.5)*shakeIntensity*(shakeTimer/15),(Math.random()-0.5)*shakeIntensity*(shakeTimer/15));shakeIntensity*=0.85;}
  drawBackground();ctx.save();ctx.translate(-camera.x,-camera.y);
  for(const p of platforms)drawPlatform(p);drawGoal();
  for(const f of butterflyFeathers){if(f.collected)continue;const bob=Math.sin(Date.now()*0.004+f.bobOffset)*4;drawButterfly(f.x,f.y+bob,14,Math.sin(Date.now()*0.01+f.bobOffset)*0.5);ctx.fillStyle='rgba(230,160,200,0.2)';ctx.beginPath();ctx.arc(f.x,f.y+bob,15,0,Math.PI*2);ctx.fill();}
  for(const e of enemies){if(e.alive)drawEnemy(e);}
  for(const p of projectiles)drawProjectile(p);for(const d of powerupDrops)drawPowerupDrop(d);drawPlayer();
  for(const p of particles){ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;
  ctx.restore();ctx.restore();
  drawUI();
  if(gameState===STATE.START)drawStartScreen();if(gameState===STATE.MODE_SELECT)drawModeSelect();
  if(gameState===STATE.LEVEL_COMPLETE)drawLevelComplete();if(gameState===STATE.WIN)drawWinScreen();if(gameState===STATE.GAMEOVER)drawGameOver();
}
function drawUI(){
  for(let i=0;i<lives;i++)drawButterfly(30+i*28,24,7,Math.sin(Date.now()*0.01+i)*0.3);
  ctx.fillStyle='#fff';ctx.font='bold 18px Georgia,SimSun,serif';ctx.textAlign='right';ctx.fillText(`${score} 🦋`,GAME_W-20,30);
  ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='14px SimSun,Georgia,serif';ctx.textAlign='center';ctx.fillText(`${STORY.levelNames[currentLevel]||''}  [${DIFFICULTY[difficulty]?.name||''}]`,GAME_W/2,24);
  drawBuffUI();
}
function drawStartScreen(){
  ctx.fillStyle='rgba(20,15,35,0.7)';ctx.fillRect(0,0,GAME_W,GAME_H);const t=Date.now()*0.001;
  ctx.fillStyle='#e0d0f0';ctx.font='bold 48px SimSun,Georgia,serif';ctx.textAlign='center';ctx.fillText('蝶 舞 岚 间',GAME_W/2,GAME_H/2-100);
  ctx.fillStyle='rgba(220,200,240,0.8)';ctx.font='italic 20px Georgia,SimSun,serif';ctx.fillText('山间有雾，雾中有蝶',GAME_W/2,GAME_H/2-58);
  const bt=t*0.6;drawButterfly(GAME_W/2-100+Math.sin(bt)*30,GAME_H/2-30,18,Math.sin(bt*1.5)*0.6);drawButterfly(GAME_W/2+100+Math.cos(bt*0.8)*30,GAME_H/2-26,14,Math.cos(bt*1.3)*0.6);
  ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='15px SimSun,Georgia,serif';STORY.prologue.split('\n').forEach((line,i)=>ctx.fillText(line,GAME_W/2,GAME_H/2+i*24));
  const pulse=Math.sin(t*2)*0.3+0.7;ctx.globalAlpha=pulse;ctx.fillStyle='rgba(255,255,255,0.8)';ctx.font='16px SimSun,Georgia,serif';ctx.fillText('点击屏幕 · 选择游戏模式',GAME_W/2,GAME_H/2+STORY.prologue.split('\n').length*24+35);ctx.globalAlpha=1;
  ctx.font='12px SimSun,Georgia,serif';ctx.fillStyle='rgba(255,255,255,0.35)';ctx.fillText('← → 移动    空格 跳跃    J键 攻击    M键 音乐',GAME_W/2,GAME_H-30);
}
function drawModeSelect(){
  ctx.fillStyle='rgba(20,15,35,0.72)';ctx.fillRect(0,0,GAME_W,GAME_H);ctx.fillStyle='#e0d0f0';ctx.font='bold 36px SimSun,Georgia,serif';ctx.textAlign='center';ctx.fillText('选择游戏难度',GAME_W/2,130);
  const modes=[DIFFICULTY.EASY,DIFFICULTY.NORMAL,DIFFICULTY.HARD],k=['1','2','3'];
  for(let i=0;i<3;i++){const mx=GAME_W/2-200+i*200,my=250,pu=Math.sin(Date.now()*0.003+i)*0.05+1;ctx.fillStyle=`rgba(40,30,60,${0.5+pu*0.15})`;ctx.strokeStyle='rgba(200,180,220,0.4)';ctx.lineWidth=1.5;roundedRect(ctx,mx-80,my-70,160,200,12);ctx.fill();ctx.stroke();ctx.font='48px serif';ctx.textAlign='center';ctx.fillText(['🌿','🍂','🔥'][i],mx,my-10);ctx.fillStyle='#fff';ctx.font='bold 20px SimSun,Georgia,serif';ctx.fillText(modes[i].name,mx,my+30);ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='13px SimSun,Georgia,serif';let h='';for(let j=0;j<modes[i].lives;j++)h+='❤️';ctx.fillText(h,mx,my+52);ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='12px SimSun,Georgia,serif';ctx.fillText(modes[i].desc,mx,my+72);ctx.globalAlpha=Math.sin(Date.now()*0.005+i*2)*0.3+0.7;ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='bold 13px SimSun,Georgia,serif';ctx.fillText(`点击选择 / 按 ${k[i]}`,mx,my+98);ctx.globalAlpha=1;}
}
function drawLevelComplete(){
  ctx.fillStyle='rgba(20,15,35,0.72)';ctx.fillRect(0,0,GAME_W,GAME_H);drawButterfly(GAME_W/2,GAME_H/2-80,36,Math.sin(Date.now()*0.008)*0.5);
  ctx.fillStyle='#f0d080';ctx.font='bold 34px SimSun,Georgia,serif';ctx.textAlign='center';ctx.fillText(`🦋 第${currentLevel+1}幕通关 🦋`,GAME_W/2,GAME_H/2-20);
  ctx.fillStyle='#fff';ctx.font='16px SimSun,Georgia,serif';const msg=STORY.levelEpilogues[currentLevel]||'',lines=msg.split('\n');lines.forEach((line,i)=>ctx.fillText(line,GAME_W/2,GAME_H/2+i*28));
  if(levelTransitionTimer<50){ctx.globalAlpha=Math.sin(Date.now()*0.003*2)*0.3+0.7;ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='14px SimSun,Georgia,serif';ctx.fillText('点击屏幕 / 空格键 继续前行',GAME_W/2,GAME_H/2+lines.length*28+25);ctx.globalAlpha=1;}
}
function drawWinScreen(){
  ctx.fillStyle='rgba(20,12,35,0.8)';ctx.fillRect(0,0,GAME_W,GAME_H);for(let i=0;i<14;i++){const bx=(i*83+50)%GAME_W,by=GAME_H+50-((Date.now()*0.025+i*280)%(GAME_H+150));ctx.globalAlpha=by>0&&by<GAME_H?0.4:0;drawButterfly(bx,by,8+(i%4)*3,Math.sin(Date.now()*0.015+i)*0.7);}ctx.globalAlpha=1;
  const cX=GAME_W/2-230,cY=30,cW=460,cH=480;ctx.fillStyle='#faf5f0';ctx.shadowColor='rgba(0,0,0,0.35)';ctx.shadowBlur=35;ctx.fillRect(cX,cY,cW,cH);ctx.shadowBlur=0;ctx.strokeStyle='#d4b8c8';ctx.lineWidth=3;ctx.strokeRect(cX+8,cY+8,cW-16,cH-16);ctx.strokeStyle='#e8d0e0';ctx.lineWidth=1;ctx.strokeRect(cX+18,cY+18,cW-36,cH-36);ctx.fillStyle='#b87090';ctx.font='bold 24px SimSun,Georgia,serif';ctx.textAlign='center';ctx.fillText('💌 致我的小蝴蝶',GAME_W/2,cY+48);ctx.strokeStyle='#d4b8c8';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(cX+70,cY+58);ctx.lineTo(cX+cW-70,cY+58);ctx.stroke();ctx.fillStyle='#5a4a5a';ctx.font='14px SimSun,Georgia,serif';STORY.loveLetter.split('\n').forEach((line,i)=>{if(i<20)ctx.fillText(line,GAME_W/2,cY+82+i*21);});
  if(levelTransitionTimer<30){ctx.globalAlpha=Math.sin(Date.now()*0.003*2)*0.3+0.7;ctx.fillStyle='rgba(255,255,255,0.8)';ctx.font='13px SimSun,Georgia,serif';ctx.fillText('点击屏幕 选择模式再玩一次',GAME_W/2,GAME_H-12);ctx.globalAlpha=1;}
  const oT=Date.now()*0.0006;for(let i=0;i<8;i++){const a=oT+(i/8)*Math.PI*2;drawButterfly(GAME_W/2+Math.cos(a)*(cW/2+38),cY+cH/2+Math.sin(a)*(cH/2+38),9+Math.sin(oT+i)*2,Math.cos(oT*1.4+i)*0.5);}
}
function drawGameOver(){
  ctx.fillStyle='rgba(15,10,30,0.78)';ctx.fillRect(0,0,GAME_W,GAME_H);ctx.fillStyle='#d0a0c0';ctx.font='bold 34px SimSun,Georgia,serif';ctx.textAlign='center';ctx.fillText('雾未散，蝶未远',GAME_W/2,GAME_H/2-20);ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='16px SimSun,Georgia,serif';ctx.fillText('岚岚不会放弃，正如我不会放弃你',GAME_W/2,GAME_H/2+25);
  if(levelTransitionTimer<30){ctx.globalAlpha=Math.sin(Date.now()*0.003*2)*0.3+0.7;ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='14px SimSun,Georgia,serif';ctx.fillText('点击屏幕 选择模式重新出发',GAME_W/2,GAME_H/2+60);ctx.globalAlpha=1;}
}

// ==================== Game Flow ====================
function startGame(){currentLevel=0;score=0;lives=DIFFICULTY[difficulty]?.lives||5;loadLevel(0);coyoteTimer=0;jumpBufferTimer=0;jumpHeld=false;prevOnGround=false;gameState=STATE.PLAYING;}
function nextLevel(){currentLevel++;if(currentLevel>=totalLevels){gameState=STATE.WIN;levelTransitionTimer=90;}else{loadLevel(currentLevel);gameState=STATE.PLAYING;}}

// ==================== Loop ====================
function gameLoop(){
  update();render();
  const ctrls=document.getElementById('mobile-controls');if(ctrls)ctrls.style.display=(gameState===STATE.PLAYING)?'flex':'none';
  requestAnimationFrame(gameLoop);
}
loadLevel(0);gameLoop();
</script>
